<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Console | Trending Loop</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #000; --bg: #f8fafc; --blue: #2563eb; --red: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: #1e293b; }
        #authArea { position: fixed; inset: 0; background: #fff; z-index: 5000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; text-align: center; }
        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; box-sizing: border-box; }
        .btn-black { width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .top-nav { background: #fff; padding: 12px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-logo-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #000; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-box { background: #000; color: #fff; padding: 20px; border-radius: 20px; }
        .stat-box div { font-size: 22px; font-weight: 800; margin-top: 5px; }
        .order-card { background: #fff; border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 4000; justify-content: center; align-items: center; padding: 20px; }
        .modal-card { background: #fff; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; max-height: 85vh; overflow-y: auto; }
        .bottom-menu { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 15px 0; z-index: 2000; }
        .menu-item { text-align: center; font-size: 10px; font-weight: 800; color: #94a3b8; cursor: pointer; text-transform: uppercase; }
        .menu-item.active { color: #000; }
        .hidden { display: none !important; }
        #fab { position: fixed; bottom: 90px; right: 20px; width: 60px; height: 60px; background: #000; color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; cursor: pointer; z-index: 1500; }
    </style>
</head>
<body>

<div id="authArea">
    <div class="auth-card">
        <h1>Trending Loop</h1>
        <div id="loginForm">
            <input type="number" id="lPhone" placeholder="Mobile Number">
            <input type="password" id="lPass" placeholder="Password">
            <button class="btn-black" onclick="handleLogin()">Login</button>
            <p onclick="toggleAuth('reg')" style="font-size:12px; margin-top:20px; cursor:pointer;">New Partner? <b>Join for ₹799</b></p>
        </div>
        <div id="regForm" class="hidden">
            <div id="regDetails">
                <input type="text" id="rShop" placeholder="Shop Name">
                <input type="text" id="rLoc" placeholder="Location">
                <input type="number" id="rPhone" placeholder="WhatsApp Number">
                <input type="password" id="rPass" placeholder="Set Password">
                <input type="text" id="rAgent" placeholder="Agent ID (Optional)">
                <button class="btn-black" onclick="showPaymentStep()">Next: Pay ₹799</button>
                <p onclick="toggleAuth('login')" style="font-size:12px; margin-top:15px; cursor:pointer;">Back</p>
            </div>
            <div id="payStep" class="hidden">
                <h3>Scan & Pay ₹799</h3>
                <img id="regQR" style="width:180px; border-radius:10px; border:4px solid #000;">
                <input type="text" id="rTxn" placeholder="Transaction ID (UTR)">
                <button class="btn-black" onclick="verifyAndRegister()">Submit Details</button>
            </div>
        </div>
    </div>
</div>

<div id="mainUI" class="hidden">
    <div class="top-nav">
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="navShopLogo" src="https://cdn-icons-png.flaticon.com/512/606/606673.png" class="nav-logo-img">
            <b id="activeShopName">Store</b>
        </div>
        <span onclick="logout()" style="color:red; font-weight:800; cursor:pointer;">LOGOUT</span>
    </div>

    <div class="container">
        <div id="dashboard" class="view-section active">
            <div class="stats-grid">
                <div class="stat-box"><small>Orders</small><div id="cOrders">0</div></div>
                <div class="stat-box" style="background:var(--blue);"><small>Revenue</small><div id="cRev">₹0</div></div>
            </div>
            <h3 style="font-weight:800;">Recent Orders</h3>
            <div id="oList">Syncing...</div>
        </div>
        <div id="inventory" class="view-section">
            <h3 style="font-weight:800;">My Products</h3>
            <div id="pList">Loading products...</div>
        </div>
    </div>

    <div id="fab" onclick="openAddModal()">+</div>

    <div class="bottom-menu">
        <div class="menu-item active" id="mDashBtn" onclick="switchTab('dashboard')">Home</div>
        <div class="menu-item" id="mInvBtn" onclick="switchTab('inventory')">Inventory</div>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-card">
        <h3 id="modalTitle">Product Details</h3>
        <input type="hidden" id="editProductId">
        <input type="text" id="pName" placeholder="Name">
        <input type="number" id="pPrice" placeholder="Price">
        <textarea id="pDesc" placeholder="Description"></textarea>
        <div style="display:flex; align-items:center; gap:10px; margin:10px 0; background:#fff0f0; padding:10px; border-radius:12px;">
            <input type="checkbox" id="pStock" style="width:20px; height:20px;">
            <label for="pStock" style="font-weight:800; color:red; font-size:12px;">OUT OF STOCK</label>
        </div>
        <button onclick="document.getElementById('pImgInp').click()" class="btn-black" style="background:#eee; color:#000;">+ PHOTOS</button>
        <input type="file" id="pImgInp" multiple style="display:none;" onchange="pImgPre(this)">
        <div id="pImgTrack" style="display:flex; flex-wrap:wrap; margin-top:10px;"></div>
        <button class="btn-black" onclick="publish()">Save Product</button>
        <p onclick="closeModals()" style="text-align:center; color:gray; cursor:pointer; margin-top:15px;">Cancel</p>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyD0pWvaqGlQH93w3ddooHQ6Yq1-6GHus6w", authDomain: "trending-loop.firebaseapp.com", 
        projectId: "trending-loop", storageBucket: "trending-loop.firebasestorage.app",
        messagingSenderId: "206395963563", appId: "1:206395963563:web:5bba53723d14c8af139fee"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let uploadedImages = [];

    function toggleAuth(t) {
        document.getElementById('loginForm').classList.toggle('hidden', t==='reg');
        document.getElementById('regForm').classList.toggle('hidden', t==='login');
    }

    function showPaymentStep() {
        const s = document.getElementById('rShop').value;
        if(!s || !document.getElementById('rPhone').value) return alert("Fill all fields!");
        document.getElementById('regDetails').classList.add('hidden');
        document.getElementById('payStep').classList.remove('hidden');
        document.getElementById('regQR').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent('upi://pay?pa=9897180748@fam&am=799&tn=RegFee_'+s)}`;
    }

    async function verifyAndRegister() {
        const txn = document.getElementById('rTxn').value;
        if(!txn) return alert("UTR Required!");
        await db.collection("vendors").add({
            shop: document.getElementById('rShop').value, phone: document.getElementById('rPhone').value,
            password: document.getElementById('rPass').value, location: document.getElementById('rLoc').value,
            agentCode: document.getElementById('rAgent').value || "Direct", txnId: txn, status: "Pending", time: new Date()
        });
        alert("Submitted! Verification in 6-12 hours."); location.reload();
    }

    async function handleLogin() {
        const ph = document.getElementById('lPhone').value, ps = document.getElementById('lPass').value;
        const snap = await db.collection("vendors").where("phone", "in", [ph, parseInt(ph)]).get();
        let f = false;
        snap.forEach(doc => {
            if(doc.data().password == ps) {
                f = true;
                if(doc.data().status === "Active") {
                    localStorage.setItem("masterPhone", ph); localStorage.setItem("activeShop", doc.data().shop); location.reload();
                } else alert("Verification Pending (6-12 Hours)");
            }
        });
        if(!f) alert("Wrong Details!");
    }

    async function loadData() {
        const sh = localStorage.getItem("activeShop");
        db.collection("orders").where("store", "==", sh).onSnapshot(snap => {
            let hO = "", c=0, r=0;
            snap.forEach(d => {
                const o = d.data(); c++; r += parseInt(o.price);
                hO += `<div class="order-card">
                    <b>Size: ${o.size}</b> | ₹${o.price}<br><b>${o.item}</b><br><small>${o.customer} (${o.phone})</small>
                    <select onchange="updateStat('${d.id}', this.value)" style="margin-top:10px;">
                        <option value="Pending" ${o.status=='Pending'?'selected':''}>Pending</option>
                        <option value="Packing" ${o.status=='Packing'?'selected':''}>Packing</option>
                        <option value="Shipped" ${o.status=='Shipped'?'selected':''}>Shipped</option>
                        <option value="Delivered" ${o.status=='Delivered'?'selected':''}>Delivered</option>
                    </select>
                </div>`;
            });
            document.getElementById('oList').innerHTML = hO || "No Orders";
            document.getElementById('cOrders').innerText = c; document.getElementById('cRev').innerText = "₹"+r;
        });

        db.collection("products").where("store", "==", sh).onSnapshot(snap => {
            let hP = "";
            snap.forEach(d => {
                const p = d.data();
                const stock = p.outOfStock ? '<span style="color:red; font-size:10px;">(OUT OF STOCK)</span>' : '<span style="color:green; font-size:10px;">(IN STOCK)</span>';
                hP += `<div style="padding:15px; background:#fff; margin-bottom:10px; border-radius:15px; border:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${p.name}</b> ${stock}</div>
                    <div><span onclick="editProduct('${d.id}')" style="color:blue; margin-right:10px; cursor:pointer; font-weight:800;">EDIT</span><span onclick="del('${d.id}')" style="color:red; cursor:pointer; font-weight:800;">DEL</span></div>
                </div>`;
            });
            document.getElementById('pList').innerHTML = hP || "No Products.";
        });
    }

    function openAddModal() {
        document.getElementById('modalTitle').innerText = "New Product";
        document.getElementById('editProductId').value = ""; document.getElementById('pName').value = "";
        document.getElementById('pPrice').value = ""; document.getElementById('pDesc').value = "";
        document.getElementById('pStock').checked = false; document.getElementById('pImgTrack').innerHTML = ""; 
        uploadedImages = []; document.getElementById('addModal').style.display = 'flex';
    }

    async function editProduct(id) {
        const doc = await db.collection("products").doc(id).get();
        const p = doc.data();
        document.getElementById('modalTitle').innerText = "Edit Product";
        document.getElementById('editProductId').value = id;
        document.getElementById('pName').value = p.name; document.getElementById('pPrice').value = p.price;
        document.getElementById('pDesc').value = p.desc || ""; document.getElementById('pStock').checked = p.outOfStock || false;
        uploadedImages = p.images || []; document.getElementById('pImgTrack').innerHTML = "";
        uploadedImages.forEach(img => { document.getElementById('pImgTrack').innerHTML += `<img src="${img}" style="width:40px;height:40px;margin:5px;">`; });
        document.getElementById('addModal').style.display = 'flex';
    }

    async function publish() {
        const id = document.getElementById('editProductId').value;
        const data = { 
            name: document.getElementById('pName').value, price: document.getElementById('pPrice').value, 
            desc: document.getElementById('pDesc').value, store: localStorage.getItem("activeShop"), 
            outOfStock: document.getElementById('pStock').checked, images: uploadedImages, time: new Date() 
        };
        id ? await db.collection("products").doc(id).update(data) : await db.collection("products").add(data);
        alert("Saved!"); closeModals();
    }

    function pImgPre(i) {
        for(let f of i.files) {
            const r = new FileReader();
            r.onload = (e) => { uploadedImages.push(e.target.result); document.getElementById('pImgTrack').innerHTML += `<img src="${e.target.result}" style="width:40px;height:40px;">`; };
            r.readAsDataURL(f);
        }
    }

    function switchTab(t) {
        window.scrollTo(0,0);
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(t === 'dashboard' ? 'mDashBtn' : 'mInvBtn').classList.add('active');
    }

    async function updateStat(id, s) { await db.collection("orders").doc(id).update({ status: s }); }
    async function del(id) { if(confirm("Delete?")) await db.collection("products").doc(id).delete(); }
    function closeModals() { document.getElementById('addModal').style.display = 'none'; }
    function logout() { localStorage.clear(); location.reload(); }

    window.onload = () => {
        const ph = localStorage.getItem("masterPhone"), sh = localStorage.getItem("activeShop");
        if(ph && sh) {
            document.getElementById('authArea').classList.add('hidden');
            document.getElementById('mainUI').classList.remove('hidden');
            document.getElementById('activeShopName').innerText = sh; loadData();
        }
    };
</script>
</body>
</html>
