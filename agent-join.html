<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become an Agent | Trending Loop</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #fff; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        h1 { font-weight: 900; margin-bottom: 10px; }
        p { color: #64748b; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; box-sizing: border-box; font-size: 16px; }
        .btn { background: #000; color: #fff; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        .fee-tag { background: #f0fdf4; color: #16a34a; padding: 10px; border-radius: 10px; font-weight: 800; font-size: 12px; margin-bottom: 20px; display: inline-block; }
        .id-preview { background: #eef2ff; color: #4338ca; padding: 12px; border-radius: 12px; font-weight: 900; font-size: 18px; margin: 10px 0; border: 2px dashed #4338ca; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Agent Join</h1>
        <p>Join the team and start earning commission</p>
        
        <div class="fee-tag">One-time Joining Fee: ₹29</div>

        <div id="regStep">
            <input type="text" id="aName" placeholder="Full Name">
            <input type="number" id="aPhone" placeholder="WhatsApp Number">
            <input type="password" id="aPass" placeholder="Set Password">
            <button class="btn" onclick="generateAndProceed()">Next: Get My ID</button>
        </div>

        <div id="payStep" style="display:none;">
            <h3>Your Generated ID</h3>
            <div class="id-preview" id="finalID">---</div>
            <p style="color:red; font-weight:700; font-size:12px;">*Please save your ID for login</p>
            
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            
            <h3>Scan to Pay ₹29</h3>
            <img id="qr" style="width:180px; border:4px solid #000; border-radius:15px; margin:10px 0;">
            <input type="text" id="txn" placeholder="Transaction ID (UTR)">
            <button class="btn" onclick="registerAgent()">Submit Application</button>
            <p onclick="location.reload()" style="cursor:pointer; color:gray; margin-top:15px; font-size:12px;">Back</p>
        </div>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyD0pWvaqGlQH93w3ddooHQ6Yq1-6GHus6w", 
        authDomain: "trending-loop.firebaseapp.com", 
        projectId: "trending-loop",
        storageBucket: "trending-loop.firebasestorage.app",
        messagingSenderId: "206395963563",
        appId: "1:206395963563:web:5bba53723d14c8af139fee"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let generatedID = "";

    function generateAndProceed() {
        const name = document.getElementById('aName').value;
        const phone = document.getElementById('aPhone').value;
        const pass = document.getElementById('aPass').value;

        if(!name || !phone || !pass) return alert("Bhai, saari details toh bharo!");

        // Logic: Create ID like TL + 4 Random Numbers (e.g., TL8291)
        const randomNumber = Math.floor(1000 + Math.random() * 9000);
        generatedID = "TL" + randomNumber;

        document.getElementById('finalID').innerText = generatedID;
        document.getElementById('regStep').style.display = 'none';
        document.getElementById('payStep').style.display = 'block';
        
        const upi = "9897180748@fam";
        // QR updated with Generated ID in Transaction Note
        document.getElementById('qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent('upi://pay?pa='+upi+'&am=29&tn=AgentFee_'+generatedID)}`;
    }

    async function registerAgent() {
        const utr = document.getElementById('txn').value;
        if(!utr) return alert("Enter UTR number!");

        await db.collection("agents").add({
            name: document.getElementById('aName').value,
            phone: document.getElementById('aPhone').value,
            agentID: generatedID, // System generated ID saved here
            password: document.getElementById('aPass').value,
            utr: utr,
            status: "Pending",
            time: new Date()
        });

        alert("Application Sent! Your ID is: " + generatedID + ". Save it and wait for Admin activation.");
        window.location.href = "agent.html";
    }
</script>
</body>
</html>
