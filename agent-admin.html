<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Trending Loop</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --green: #16a34a; --red: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 20px; margin: 0; }
        .header { text-align: center; background: #000; color: #fff; padding: 20px; border-radius: 20px; margin-bottom: 25px; }
        .section { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .btn { border: none; padding: 10px 15px; border-radius: 10px; font-weight: 800; cursor: pointer; color: #fff; transition: 0.3s; }
        .btn-history { background: #e2e8f0; color: #0f172a; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 12px; }
        .upi-card { background: #f0f7ff; padding: 12px; border-radius: 12px; margin-top: 10px; font-size: 13px; border: 1px dashed var(--blue); }
        h3 { margin-top: 0; font-weight: 900; display: flex; justify-content: space-between; align-items: center; }
        
        /* Modal Styles for Admin History */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .m-content { background: #fff; padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; max-height: 80vh; overflow-y: auto; }
        .history-item { text-align: left; padding: 15px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="header"><h1>TL MASTER CONTROL</h1></div>

    <div class="section">
        <h3>
            <span>Payment Requests <span id="wCount" style="color:var(--blue);">0</span></span>
            <button class="btn-history" onclick="openHistory()">VIEW HISTORY</button>
        </h3>
        <div id="withdrawList">Loading...</div>
    </div>

    <div class="section">
        <h3>New Vendors <span id="vCount">0</span></h3>
        <div id="vendorList">Loading...</div>
    </div>

    <div class="section">
        <h3>New Agents <span id="aCount">0</span></h3>
        <div id="agentList">Loading...</div>
    </div>

    <div id="historyModal" class="modal">
        <div class="m-content">
            <h3 style="margin-top:0; border-bottom: 2px solid #eee; padding-bottom: 10px;">Completed Payments</h3>
            <div id="historyData" style="margin-top: 15px;">Loading history...</div>
            <button class="btn" onclick="closeModal('historyModal')" style="margin-top:20px; background:#000; width: 100%;">Close</button>
        </div>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyD0pWvaqGlQH93w3ddooHQ6Yq1-6GHus6w", authDomain: "trending-loop.firebaseapp.com", 
        projectId: "trending-loop", storageBucket: "trending-loop.firebasestorage.app",
        messagingSenderId: "206395963563", appId: "1:206395963563:web:5bba53723d14c8af139fee"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function sync() {
        // Pending Withdrawals
        db.collection("withdrawals").where("status", "==", "Pending").onSnapshot(snap => {
            document.getElementById('wCount').innerText = snap.size;
            let h = "";
            snap.forEach(doc => {
                const w = doc.data();
                h += `<div style="border-bottom:1px solid #eee; padding:15px 0;">
                    <b>Agent: ${w.agentID}</b> <span style="float:right; font-weight:900; font-size:18px; color:var(--blue);">₹${w.amount}</span>
                    <div class="upi-card"><b>Name:</b> ${w.holderName} <br> <b>UPI:</b> ${w.upi}</div>
                    <button onclick="markPaid('${doc.id}', '${w.agentID}', ${w.amount})" class="btn" style="background:var(--blue); width:100%; margin-top:10px;">MARK PAID & RESET BALANCE</button>
                </div>`;
            });
            document.getElementById('withdrawList').innerHTML = h || "No pending requests.";
        });

        // Vendors Approval
        db.collection("vendors").where("status", "==", "Pending").onSnapshot(snap => {
            document.getElementById('vCount').innerText = snap.size;
            let h = "";
            snap.forEach(doc => {
                h += `<div class="item"><span><b>${doc.data().shop}</b> <br><small>Agent: ${doc.data().agentCode}</small></span><button onclick="approve('vendors','${doc.id}')" class="btn" style="background:var(--green);">APPROVE</button></div>`;
            });
            document.getElementById('vendorList').innerHTML = h || "No pending vendors.";
        });

        // Agents Approval
        db.collection("agents").where("status", "==", "Pending").onSnapshot(snap => {
            document.getElementById('aCount').innerText = snap.size;
            let h = "";
            snap.forEach(doc => {
                h += `<div class="item"><span><b>${doc.data().name}</b> <br><small>ID: ${doc.data().agentID}</small></span><button onclick="approve('agents','${doc.id}')" class="btn" style="background:var(--green);">APPROVE</button></div>`;
            });
            document.getElementById('agentList').innerHTML = h || "No pending agents.";
        });
    }

    async function approve(col, id) { 
        if(confirm("Approve this account?")) {
            await db.collection(col).doc(id).update({ status: "Active" }); 
        }
    }

    async function markPaid(docId, agentID, amt) {
        if(confirm(`Confirm ₹${amt} Payment to ${agentID}? Balance will reset to 0.`)) {
            try {
                // 1. Complete Withdrawal Request
                await db.collection("withdrawals").doc(docId).update({ status: "Completed" });

                // 2. Reset Agent's Balance
                const vSnap = await db.collection("vendors")
                    .where("agentCode", "==", agentID)
                    .where("status", "==", "Active")
                    .get();

                const batch = db.batch();
                vSnap.forEach(vDoc => {
                    if(vDoc.data().isPaid !== true) {
                        batch.update(vDoc.ref, { isPaid: true });
                    }
                });
                
                await batch.commit();
                alert("Payment Successful! Agent balance reset.");
            } catch (e) {
                alert("Error: " + e.message);
            }
        }
    }

    // ADMIN HISTORY LOGIC
    function openHistory() {
        document.getElementById('historyModal').style.display = 'flex';
        document.getElementById('historyData').innerHTML = "Loading history...";

        db.collection("withdrawals").where("status", "==", "Completed").onSnapshot(snap => {
            let docs = [];
            snap.forEach(d => docs.push(d.data()));
            
            // Manual Sort (Latest First)
            docs.sort((a, b) => b.time.toDate() - a.time.toDate());

            let hHtml = "";
            docs.forEach(w => {
                hHtml += `<div class="history-item">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <b>${w.agentID}</b>
                        <b style="color:var(--green);">₹${w.amount}</b>
                    </div>
                    <div style="font-size: 12px; color: #475569;">
                        <b>Paid to:</b> ${w.holderName} (${w.upi})<br>
                        <small style="color:gray;">${w.time.toDate().toLocaleString()}</small>
                    </div>
                </div>`;
            });
            document.getElementById('historyData').innerHTML = hHtml || "No completed payments yet.";
        });
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    window.onload = sync;
</script>
</body>
</html>
