<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard | Trending Loop</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding-bottom: 50px; }
        .container { max-width: 450px; margin: auto; padding: 20px; }
        
        /* EXACT UI FROM YOUR SCREENSHOT */
        .card { background: #fff; padding: 35px 25px; border-radius: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); text-align: center; margin-bottom: 20px; }
        h1 { font-weight: 900; font-size: 32px; margin-bottom: 30px; letter-spacing: -1px; }
        input { width: 100%; padding: 18px; margin: 10px 0; border: 1px solid #eee; border-radius: 15px; font-size: 16px; background: #fff; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #000; }
        
        .btn-black { width: 100%; background: #000; color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 14px; transition: 0.3s; margin-top: 10px; }
        .btn-black:disabled { background: #ccc; cursor: not-allowed; }
        .btn-ghost { background: #f1f5f9; color: #475569; padding: 14px; border-radius: 15px; width: 100%; border: none; font-weight: 700; cursor: pointer; margin-top: 12px; font-size: 13px; }

        /* DASHBOARD ELEMENTS */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .stat-box { padding: 20px; border-radius: 25px; text-align: center; }
        .blue { background: #f0f4ff; color: #2563eb; }
        .green { background: #f0fff4; color: #16a34a; }
        .stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8; }
        .stat-val { font-size: 26px; font-weight: 900; }

        .list-card { background: #fff; border-radius: 30px; padding: 25px; text-align: left; box-shadow: 0 5px 20px rgba(0,0,0,0.02); }
        .ref-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f8fafc; }
        .ref-item:last-child { border: none; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(5px); }
        .m-content { background: #fff; padding: 30px; border-radius: 30px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .history-item { text-align: left; padding: 15px; border-bottom: 1px solid #eee; }
        .status-badge { font-size: 9px; padding: 4px 10px; border-radius: 6px; font-weight: 800; float: right; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="loginArea" class="container" style="margin-top: 80px;">
        <div class="card">
            <h1>Agent Login</h1>
            <input type="text" id="aCode" placeholder="Agent ID (e.g. TL1234)">
            <input type="password" id="aPass" placeholder="Password">
            <button class="btn-black" onclick="loginAgent()">Login</button>
        </div>
    </div>

    <div id="dashArea" class="container" style="display:none;">
        <div class="card">
            <div style="font-size:28px; font-weight:900; letter-spacing:-1px;" id="displayID">---</div>
            
            <div class="stat-grid">
                <div class="stat-box blue">
                    <div class="stat-label">Total Shops</div>
                    <div class="stat-val" id="shopCount">0</div>
                </div>
                <div class="stat-box green">
                    <div class="stat-label">Available</div>
                    <div class="stat-val" id="totalEarn">₹0</div>
                </div>
            </div>

            <button class="btn-black" id="wBtn" onclick="openModal('payModal')">Withdraw Now</button>
            <button class="btn-ghost" onclick="openHistory()">View Payment History</button>
        </div>

        <div class="list-card">
            <h3 style="font-weight:900; margin:0 0 15px 0; font-size:18px;">MY REFERRALS</h3>
            <div id="referralList">Loading...</div>
        </div>
        
        <p onclick="logout()" style="text-align:center; color:#ef4444; font-weight:800; cursor:pointer; margin-top:30px; font-size:14px; text-transform:uppercase; letter-spacing:1px;">Logout Account</p>
    </div>

    <div id="payModal" class="modal">
        <div class="m-content">
            <h2 style="margin-top:0; font-weight:900;">Withdraw</h2>
            <p style="font-size:13px; color:#64748b; margin-bottom:20px;">Enter details to receive ₹<span id="drawAmt">0</span></p>
            <input type="text" id="upiID" placeholder="UPI ID (e.g. name@okaxis)">
            <input type="text" id="accName" placeholder="Account Holder Name">
            <button class="btn-black" onclick="requestWithdrawal()">Send Request</button>
            <p onclick="closeModal('payModal')" style="margin-top:20px; color:#94a3b8; cursor:pointer; font-size:12px; font-weight:700;">CANCEL</p>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="m-content">
            <h2 style="margin-top:0; font-weight:900; border-bottom:1px solid #eee; padding-bottom:15px;">History</h2>
            <div id="historyData" style="margin-top: 10px; max-height: 350px; overflow-y: auto;">Loading...</div>
            <button class="btn-ghost" onclick="closeModal('historyModal')" style="margin-top:20px; background:#000; color:#fff;">Close</button>
        </div>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyD0pWvaqGlQH93w3ddooHQ6Yq1-6GHus6w", authDomain: "trending-loop.firebaseapp.com", 
        projectId: "trending-loop", storageBucket: "trending-loop.firebasestorage.app",
        messagingSenderId: "206395963563", appId: "1:206395963563:web:5bba53723d14c8af139fee"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentBalance = 0;

    async function loginAgent() {
        const id = document.getElementById('aCode').value.toUpperCase().trim();
        const ps = document.getElementById('aPass').value;
        if(!id || !ps) return alert("Please enter ID and Password");

        const snap = await db.collection("agents").where("agentID", "==", id).get();
        let found = false;
        snap.forEach(doc => {
            if(doc.data().password === ps && doc.data().status === "Active") {
                found = true; localStorage.setItem("activeAgent", id); showDash();
            }
        });
        if(!found) alert("Invalid ID/Password or Account not Active.");
    }

    function showDash() {
        const id = localStorage.getItem("activeAgent");
        if(!id) {
            document.getElementById('loginArea').style.display = 'block';
            document.getElementById('dashArea').style.display = 'none';
            return;
        }
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('dashArea').style.display = 'block';
        document.getElementById('displayID').innerText = id;

        // Sync Pending Withdrawal Button State
        db.collection("withdrawals").where("agentID", "==", id).where("status", "==", "Pending").onSnapshot(s => {
            const btn = document.getElementById('wBtn');
            btn.disabled = !s.empty;
            btn.innerText = s.empty ? "Withdraw Now" : "Request Pending...";
        });

        // Sync Balance & Real-time Zero Logic
        db.collection("vendors").where("agentCode", "==", id).onSnapshot(snap => {
            let unpaidActiveCount = 0;
            let html = "";
            snap.forEach(doc => {
                const v = doc.data();
                const isPaid = (v.isPaid === true);
                const isActive = (v.status === "Active");
                if(isActive && !isPaid) unpaidActiveCount++;
                
                html += `<div class="ref-item">
                    <span><b style="font-size:15px;">${v.shop}</b><br><small style="color:#94a3b8;">${v.phone}</small></span>
                    <span style="color:${isPaid ? '#94a3b8' : (isActive ? '#16a34a' : '#f59e0b')}; font-weight:800; font-size:12px;">
                        ${isPaid ? 'PAID' : (isActive ? 'ACTIVE' : 'PENDING')}
                    </span>
                </div>`;
            });
            currentBalance = unpaidActiveCount * 200;
            document.getElementById('shopCount').innerText = snap.size;
            document.getElementById('totalEarn').innerText = "₹" + currentBalance;
            document.getElementById('drawAmt').innerText = currentBalance;
            document.getElementById('referralList').innerHTML = html || "No referrals yet.";
        });
    }

    function openHistory() {
        const id = localStorage.getItem("activeAgent");
        document.getElementById('historyModal').style.display = 'flex';
        db.collection("withdrawals").where("agentID", "==", id).onSnapshot(snap => {
            let docs = [];
            snap.forEach(d => docs.push(d.data()));
            docs.sort((a, b) => b.time.toDate() - a.time.toDate()); // Manual Sort

            let hHtml = "";
            docs.forEach(w => {
                const sColor = w.status === "Completed" ? "#16a34a" : "#f59e0b";
                hHtml += `<div class="history-item">
                    <b style="font-size:16px;">₹${w.amount}</b> <span class="status-badge" style="background:${sColor}20; color:${sColor}">${w.status}</span><br>
                    <small style="color:#94a3b8;">${w.time.toDate().toLocaleString()}</small>
                </div>`;
            });
            document.getElementById('historyData').innerHTML = hHtml || "No transaction history.";
        });
    }

    async function requestWithdrawal() {
        const upi = document.getElementById('upiID').value.trim();
        const name = document.getElementById('accName').value.trim();
        if(!upi || !name) return alert("Enter Payment Details!");

        await db.collection("withdrawals").add({
            agentID: localStorage.getItem("activeAgent"),
            amount: currentBalance,
            upi: upi,
            holderName: name,
            status: "Pending",
            time: new Date()
        });
        alert("Success! Request sent to Admin.");
        closeModal('payModal');
    }

    function openModal(id) { 
        if(id === 'payModal' && currentBalance <= 0) return alert("Insufficient Balance!");
        document.getElementById(id).style.display = 'flex'; 
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function logout() { localStorage.clear(); location.reload(); }
    window.onload = showDash;
</script>
</body>
</html>
