<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="monetag" content="4fbe0dc0f88d95934b9e9f1ecd3c4c4b">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Loop | Professional Marketplace</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Oswald:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --black: #000; --white: #fff; --gold: #d4af37; --bg: #f5f6f8; --green: #00b894; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding-bottom: 30px; overflow-x: hidden; }
        
        .navbar { background: #000; color: #fff; padding: 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; }
        .nav-logo { font-weight: 900; letter-spacing: 4px; font-size: 18px; text-transform: uppercase; cursor: pointer; }
        .cart-icon { font-size: 22px; cursor: pointer; position: relative; }
        .cart-badge { position: absolute; top: -8px; right: -8px; background: var(--gold); color: #000; font-size: 10px; padding: 2px 5px; border-radius: 50%; font-weight: 900; }

        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #fff; z-index: 2000; transition: 0.3s; padding: 30px 20px; box-sizing: border-box; }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .overlay.active { display: block; }
        .sidebar-link { display: block; padding: 15px 0; color: #000; text-decoration: none; font-weight: 700; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #f0f0f0; }

        #mainSlider { background: #111; color: #fff; height: 45px; display: flex; align-items: center; overflow: hidden; position: relative; }
        .slider-track { display: flex; transition: 0.6s ease-in-out; width: 100%; position: absolute; }
        .slide { min-width: 100%; text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; }

        #homeView { padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .product-card { background: #fff; border-radius: 20px; overflow: hidden; border: 1px solid #f0f0f0; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .product-card img { width: 100%; height: 180px; object-fit: cover; }
        .p-info { padding: 12px; text-align: center; }
        .p-shop-tag { font-size: 9px; color: var(--gold); font-weight: 800; margin-bottom: 5px; display: block; }
        .p-name { font-weight: 700; font-size: 11px; color: #666; text-transform: uppercase; }
        .p-price { font-family: 'Oswald', sans-serif; font-size: 18px; color: #000; margin-top: 5px; display: block; }

        #detailView { display: none; background: #fff; }
        .shop-banner { display: flex; align-items: center; gap: 10px; padding: 15px; background: #fafafa; border-bottom: 1px solid #eee; }
        .shop-logo-circle { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; }
        .angle-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; }
        .angle-img { min-width: 100%; height: 420px; object-fit: cover; }
        .buy-btn { width: 100%; background: #000; color: #fff; border: none; padding: 20px; border-radius: 20px; font-weight: 800; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; }

        #trackView { display: none; padding: 15px; }
        .meesho-card { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border-left: 5px solid var(--gold); }
        .stepper { margin: 25px 0; position: relative; }
        .step-line { height: 4px; background: #eee; width: 100%; position: absolute; top: 12px; z-index: 1; }
        .step-fill { height: 4px; background: var(--green); width: 0%; position: absolute; top: 12px; z-index: 2; transition: 1s; }
        .truck-icon { position: absolute; top: -15px; font-size: 20px; z-index: 10; transition: 1s; left: 0; }
        .dots { display: flex; justify-content: space-between; position: relative; z-index: 5; }
        .dot { width: 28px; height: 28px; background: #fff; border: 2px solid #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .dot.done { border-color: var(--green); color: var(--green); font-weight: 900; }
        .step-labels { display: flex; justify-content: space-between; margin-top: 10px; font-size: 8px; font-weight: 900; color: #aaa; text-transform: uppercase; }

        #orderModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: flex-end; }
        .m-content { background: #fff; padding: 30px; border-radius: 30px 30px 0 0; width: 100%; max-width: 500px; text-align: center; }
        input, select { width: 100%; padding: 16px; margin: 8px 0; border: 1px solid #eee; border-radius: 15px; outline: none; background: #f9f9f9; box-sizing: border-box; font-family: inherit; font-weight: 600; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div style="font-weight:900; font-size:20px; margin-bottom:20px; border-bottom:2px solid #000;">MENU</div>
        <div class="sidebar-link" onclick="showHome(); toggleMenu();">Home 🏠</div>
        <a href="agent-join.html" class="sidebar-link" style="color: #2563eb;">Become an Agent 💰</a>
        <a href="agent.html" class="sidebar-link">Agent Login 🔐</a>
        <a href="portal.html" class="sidebar-link">Partner Registration 🚀</a>
        <a href="portal.html" class="sidebar-link">Vendor Console 🔑</a>
    </div>

    <div class="navbar">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <div class="nav-logo" onclick="showHome()">Trending Loop</div>
        <div class="cart-icon" onclick="showTrack()">🛒<span class="cart-badge" id="cartBadge">0</span></div>
    </div>

    <div id="mainSlider">
        <div class="slider-track" id="sliderTrack">
            <div class="slide">✨ PREMIUM QUALITY PRODUCTS</div>
            <div class="slide">🔥 NEW SEASON ARRIVALS 2026</div>
        </div>
    </div>

    <div id="homeView"><div class="grid" id="mainGrid"></div></div>

    <div id="trackView">
        <div onclick="showHome()" style="font-weight:800; cursor:pointer; margin-bottom:15px; font-size:12px;">← BACK TO SHOPPING</div>
        <h2 style="font-weight:900;">MY ORDERS</h2>
        <div id="meeshoList"></div>
        <div style="background:#fff; border-radius:20px; padding:20px; margin-top:20px;">
            <p style="font-size:10px; font-weight:800; color:#aaa;">SEARCH BY PHONE</p>
            <input type="number" id="trackPhone" placeholder="Enter Registered Number">
            <button class="buy-btn" onclick="fetchByPhone()" style="padding:15px; font-size:12px;">FIND ORDERS</button>
        </div>
    </div>

    <div id="detailView">
        <div class="shop-banner">
            <img id="detShopLogo" src="" class="shop-logo-circle">
            <div>
                <b id="detShopName" style="font-size:14px; text-transform:uppercase;">Loading Store...</b><br>
                <small style="color:var(--green); font-weight:800; font-size:10px;">✓ VERIFIED MERCHANT</small>
            </div>
        </div>
        <div class="angle-container" id="angleTrack"></div>
        <div style="padding:25px;">
            <div id="detName" style="font-size:24px; font-weight:900; text-transform:uppercase;"></div>
            <div id="detPrice" style="font-size:28px; margin:10px 0; font-family:'Oswald';"></div>
            <div id="detDesc" style="font-size:13px; color:#666; border-top:1px solid #eee; padding-top:15px; line-height:1.6;"></div>
            <button class="buy-btn" onclick="openOrderModal()" style="margin-top:20px;">PLACE ORDER NOW</button>
            <div style="margin-top:40px; font-weight:900; font-size:12px; border-bottom:2px solid #000; display:inline-block; margin-bottom:15px;">MORE FROM THIS STORE</div>
            <div class="grid" id="suggestionGrid"></div>
        </div>
    </div>

    <div id="orderModal">
        <div class="m-content">
            <h3 style="font-weight:900;">CHECKOUT</h3>
            <input type="text" id="custN" placeholder="Full Name">
            <input type="number" id="custP" placeholder="WhatsApp Number">
            <input type="text" id="custA" placeholder="Full Delivery Address">
            <select id="custSize">
                <option value="" disabled selected>Select Size</option>
                <option value="S">Small (S)</option>
                <option value="M">Medium (M)</option>
                <option value="L">Large (L)</option>
                <option value="XL">Extra Large (XL)</option>
                <option value="Free Size">Free Size</option>
            </select>
            <select id="payMethod" onchange="togglePay()"></select>
            <div id="qrSection" style="display:none; margin-top:10px;"><img src="" id="qrImg" style="width:150px;"></div>
            <button class="buy-btn" onclick="finalizeOrder()" style="margin-top:20px;">CONFIRM ORDER</button>
            <div onclick="closeModal()" style="margin-top:15px; color:#bbb; cursor:pointer; font-weight:700;">CANCEL</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD0pWvaqGlQH93w3ddooHQ6Yq1-6GHus6Y", authDomain: "trending-loop.firebaseapp.com", projectId: "trending-loop" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allP = [], activeP = null;

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }

        async function init() {
            const snap = await db.collection("products").orderBy("time", "desc").get();
            allP = []; snap.forEach(doc => { let d = doc.data(); d.id = doc.id; allP.push(d); });
            renderHome();
            updateCartBadge();
            setInterval(() => { let tr = document.getElementById('sliderTrack'); if(tr) tr.style.transform = `translateX(-${(Math.floor(Date.now()/3000)%2)*100}%)`; }, 3000);
        }

        function renderHome() {
            const grid = document.getElementById('mainGrid'); grid.innerHTML = "";
            allP.forEach((p, idx) => { grid.innerHTML += `<div class="product-card" onclick="viewProduct(${idx})"><img src="${p.images[0]}"><div class="p-info"><span class="p-shop-tag">STORE: ${p.store.toUpperCase()}</span><div class="p-name">${p.name}</div><span class="p-price">₹${p.price}</span></div></div>`; });
        }

        async function viewProduct(idx) {
            activeP = allP[idx];
            document.getElementById('homeView').style.display='none'; document.getElementById('mainSlider').style.display='none'; document.getElementById('trackView').style.display='none'; document.getElementById('detailView').style.display='block';
            const vSnap = await db.collection("vendors").where("shop", "==", activeP.store).get();
            vSnap.forEach(v => {
                document.getElementById('detShopLogo').src = v.data().logo || 'https://cdn-icons-png.flaticon.com/512/606/606673.png';
                document.getElementById('detShopName').innerText = v.data().shop;
            });
            const track = document.getElementById('angleTrack'); track.innerHTML = "";
            activeP.images.forEach(img => { track.innerHTML += `<img src="${img}" class="angle-img">`; });
            document.getElementById('detName').innerText = activeP.name;
            document.getElementById('detPrice').innerText = "₹" + activeP.price;
            document.getElementById('detDesc').innerText = activeP.desc || "Verified Quality product.";
            renderSuggestions(activeP.store, idx); window.scrollTo(0,0);
        }

        function renderSuggestions(store, exIdx) {
            const sGrid = document.getElementById('suggestionGrid'); sGrid.innerHTML = "";
            allP.forEach((p, idx) => { if(p.store === store && idx !== exIdx) sGrid.innerHTML += `<div class="product-card" onclick="viewProduct(${idx})"><img src="${p.images[0]}"><div class="p-info"><div>${p.name}</div><div class="p-price">₹${p.price}</div></div></div>`; });
        }

        function showHome() { document.getElementById('homeView').style.display='block'; document.getElementById('mainSlider').style.display='flex'; document.getElementById('detailView').style.display='none'; document.getElementById('trackView').style.display='none'; }
        async function showTrack() { 
            document.getElementById('homeView').style.display='none'; document.getElementById('mainSlider').style.display='none'; document.getElementById('detailView').style.display='none'; document.getElementById('trackView').style.display='block'; 
            renderOrders(JSON.parse(localStorage.getItem("myOrders") || "[]"));
        }

        async function renderOrders(ids) {
            const list = document.getElementById('meeshoList'); list.innerHTML = "";
            if(ids.length === 0) list.innerHTML = "<p style='text-align:center; padding:20px; color:gray;'>No active orders.</p>";
            for(let id of ids) {
                const doc = await db.collection("orders").doc(id).get();
                if(doc.exists) {
                    const o = doc.data(); const st = o.status || "Pending";
                    let fill = "0%", truck = "0%", s1="done", s2="", s3="", s4="";
                    if(st==="Packing"){ fill="33%"; truck="30%"; s2="done"; }
                    else if(st==="Shipped"){ fill="66%"; truck="63%"; s2="done"; s3="done"; }
                    else if(st==="Delivered"){ fill="100%"; truck="92%"; s2="done"; s3="done"; s4="done"; }

                    list.innerHTML += `<div class="meesho-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <b style="font-size:12px; color:var(--gold);">SOLD BY: ${o.store.toUpperCase()}</b>
                            <span style="font-size:10px; color:#888;">#${id.slice(-6)}</span>
                        </div>
                        <div style="font-size:14px; font-weight:700;">${o.item}</div>
                        <div class="stepper">
                            <div class="step-line"></div><div class="step-fill" style="width:${fill}"></div>
                            <div class="truck-icon" style="left:${truck}">🚚</div>
                            <div class="dots"><div class="dot ${s1}">✓</div><div class="dot ${s2}">✓</div><div class="dot ${s3}">✓</div><div class="dot ${s4}">✓</div></div>
                            <div class="step-labels"><span>Placed</span><span>Packing</span><span>Shipped</span><span>Delivered</span></div>
                        </div>
                    </div>`;
                }
            }
        }

        function updateCartBadge() {
            const orders = JSON.parse(localStorage.getItem("myOrders") || "[]");
            document.getElementById('cartBadge').innerText = orders.length;
            document.getElementById('cartBadge').style.display = orders.length > 0 ? 'block' : 'none';
        }

        function openOrderModal() {
            const pm = document.getElementById('payMethod');
            pm.innerHTML = activeP.payment === 'online' ? `<option value="Online">Online Only</option>` : `<option value="COD">Cash on Delivery</option><option value="Online">Online Payment</option>`;
            document.getElementById('orderModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }
        function togglePay() {
            const m = document.getElementById('payMethod').value;
            document.getElementById('qrSection').style.display = m === 'Online' ? 'block' : 'none';
            if(m === 'Online') document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent('upi://pay?pa=9897180748@fam&am='+activeP.price)}`;
        }

        async function finalizeOrder() {
            const n = document.getElementById('custN').value, ph = document.getElementById('custP').value, ad = document.getElementById('custA').value, pm = document.getElementById('payMethod').value, sz = document.getElementById('custSize').value;
            if(!n || !ph || !ad || !sz) return alert("Please fill all details including size!");

            const vSnap = await db.collection("vendors").where("shop", "==", activeP.store).get();
            let vPh = "9897180748"; vSnap.forEach(v => vPh = v.data().phone);

            const res = await db.collection("orders").add({ item: activeP.name, size: sz, customer: n, phone: ph, address: ad, payment: pm, price: activeP.price, store: activeP.store, status: "Pending", time: new Date() });

            let myOrders = JSON.parse(localStorage.getItem("myOrders") || "[]");
            myOrders.push(res.id);
            localStorage.setItem("myOrders", JSON.stringify(myOrders));

            const msg = `*NEW ORDER FOR ${activeP.store.toUpperCase()}* 📦\n\n*Order ID:* #${res.id.slice(-6)}\n*Item:* ${activeP.name}\n*Size:* ${sz}\n*Customer:* ${n}\n*Phone:* ${ph}\n*Address:* ${ad}\n\n_Powered by Trending Loop_`;
            window.open(`https://wa.me/91${vPh}?text=${encodeURIComponent(msg)}`, '_blank');
            showTrack();
        }

        async function fetchByPhone() {
            const ph = document.getElementById('trackPhone').value;
            const snap = await db.collection("orders").where("phone", "==", ph).get();
            let ids = []; snap.forEach(doc => ids.push(doc.id));
            renderOrders(ids);
        }
        window.onload = init;
    </script>
</body>
        </html>
